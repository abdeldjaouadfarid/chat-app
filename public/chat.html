
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat Room</title>  
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="./css/chat.css">
</head>
<body>
    <div class="container py-4">

        <!-- Room Header -->
        <div class="text-center mb-4">
            <h1 id="roomName"><i class="fas fa-comments"></i> Ideas Café</h1>
            <p class="text-muted">
                Connect, chat, and share ideas with people around the world.
            </p>
        </div>

        <!-- Chat Layout -->
        <div class="chat-wrapper">

            <!-- Online Users -->
            <aside id="usersList">
                <h5>
                    <i class="fas fa-users"></i>
                    Online Users
                </h5>

                <ul id="userListItems">
                    <li>John</li>
                    <li>Emma</li>
                    <li>Michael</li>
                    <li>Sarah</li>
                </ul>
            </aside>

            <!-- Messages Area -->
            <main id="messages">

                <h5>
                    <i class="fas fa-comments"></i> Messages
                </h5>

                <div id="messageList">

                    <div class="message">
                        <p class="username">
                            John
                            <span class="timestamp">10:30 AM</span>
                        </p>

                        <p class="message-text">
                            Welcome everyone! Let's start the discussion.
                        </p>
                    </div>

                    <div class="message">
                        <p class="username">
                            Emma
                            <span class="timestamp">10:31 AM</span>
                        </p>

                        <p class="message-text">
                            Great idea! I'm excited to be here.
                        </p>
                    </div>

                </div>

            </main>

        </div>

        <!-- Message Form -->
        <form id="messageForm" class="d-flex mt-3">

            <input
                type="text"
                id="messageInput"
                class="form-control mr-2"
                placeholder="Type your message..."
                autocomplete="off"
                required
            >

            <button type="submit" class="btn btn-primary">
               <i class="fas fa-paper-plane"></i> 
            </button>

        </form>

    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
